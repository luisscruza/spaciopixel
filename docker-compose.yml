services:
  postgres:
    image: postgres:16
    container_name: spaciopixel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spaciopixel}
      POSTGRES_USER: ${POSTGRES_USER:-spaciopixel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spaciopixel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: spaciopixel-redis
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: spaciopixel-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    working_dir: /var/www/html
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${API_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-spaciopixel}
      DB_USERNAME: ${POSTGRES_USER:-spaciopixel}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-spaciopixel}
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./apps/api:/var/www/html
      - api-vendor:/var/www/html/vendor
    command: sh -lc "composer install && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  realtime:
    build:
      context: ./apps/realtime
      dockerfile: Dockerfile
    container_name: spaciopixel-realtime
    restart: unless-stopped
    depends_on:
      - redis
    working_dir: /app
    ports:
      - "${REALTIME_PORT:-2567}:2567"
    environment:
      PORT: 2567
      NODE_ENV: development
      API_URL: http://api:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./apps/realtime:/app
      - realtime-node-modules:/app/node_modules
    command: sh -lc "npm install && npm run dev"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: spaciopixel-web
    restart: unless-stopped
    depends_on:
      - api
      - realtime
    working_dir: /app
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-8000}
      VITE_REALTIME_URL: ws://localhost:${REALTIME_PORT:-2567}
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules
    command: sh -lc "npm install && npm install -D @rolldown/binding-linux-arm64-gnu && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres-data:
  api-vendor:
  realtime-node-modules:
  web-node-modules:
